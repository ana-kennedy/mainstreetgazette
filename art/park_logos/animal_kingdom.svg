  </defs>
  <!-- Trunk - thick baobab style -->
  <path d="M88,155 L86,130 Q82,118 78,110 Q72,98 74,90 Q76,82 82,80 Q88,78 92,82 L96,88 L100,78 L104,88 L108,82 Q112,78 118,80 Q124,82 126,90 Q128,98 122,110 Q118,118 114,130 L112,155 Z" fill="#5C3A1A"/>
