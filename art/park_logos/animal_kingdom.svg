  <ellipse cx="100" cy="75" rx="52" ry="42" fill="#2A6B2A"/>
  <ellipse cx="72" cy="80" rx="28" ry="24" fill="#2A6B2A"/>
  <ellipse cx="128" cy="80" rx="28" ry="24" fill="#2A6B2A"/>
  <ellipse cx="100" cy="60" rx="38" ry="30" fill="#348A34"/>
  <ellipse cx="78" cy="68" rx="22" ry="18" fill="#348A34"/>
  <ellipse cx="122" cy="68" rx="22" ry="18" fill="#348A34"/>
  <ellipse cx="100" cy="50" rx="28" ry="22" fill="#3FA83F"/>
