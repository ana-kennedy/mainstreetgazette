<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dcaSky" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#C0392B"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#dcaSky)"/>
  <!-- Ocean -->
  <path d="M0,130 Q50,122 100,130 Q150,138 200,130 L200,200 L0,200 Z" fill="#1565C0" opacity="0.7"/>
  <path d="M0,138 Q40,132 80,138 Q120,144 160,138 Q180,135 200,138 L200,200 L0,200 Z" fill="#0D47A1" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="100" cy="72" r="26" fill="#FFD700"/>
  <!-- Sun rays -->
  <line x1="100" y1="40" x2="100" y2="33" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="46" x2="124" y2="40" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="134" y1="60" x2="140" y2="56" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="138" y1="80" x2="145" y2="80" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="46" x2="76" y2="40" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="60" x2="60" y2="56" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <line x1="62" y1="80" x2="55" y2="80" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- Sun inner glow -->
  <circle cx="100" cy="72" r="20" fill="#FFF176" opacity="0.4"/>
  <!-- Bridge towers (Golden Gate inspired) -->
  <!-- Left tower -->
  <rect x="58" y="105" width="8" height="30" fill="#B71C1C"/>
  <rect x="55" y="113" width="14" height="4" rx="1" fill="#B71C1C"/>
  <rect x="55" y="121" width="14" height="4" rx="1" fill="#B71C1C"/>
  <!-- Right tower -->
  <rect x="134" y="105" width="8" height="30" fill="#B71C1C"/>
  <rect x="131" y="113" width="14" height="4" rx="1" fill="#B71C1C"/>
  <rect x="131" y="121" width="14" height="4" rx="1" fill="#B71C1C"/>
  <!-- Bridge cables -->
  <path d="M62,105 Q100,98 138,105" fill="none" stroke="#B71C1C" stroke-width="1.5"/>
  <path d="M55,135 Q100,125 145,135" fill="none" stroke="#D32F2F" stroke-width="1.2" opacity="0.6"/>
  <!-- Bridge deck -->
  <rect x="42" y="132" width="116" height="5" rx="2" fill="#8B0000"/>
  <!-- Vertical suspender cables -->
  <line x1="70" y1="101" x2="70" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="80" y1="99" x2="80" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="90" y1="98" x2="90" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="100" y1="98" x2="100" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="110" y1="98" x2="110" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="120" y1="99" x2="120" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <line x1="130" y1="101" x2="130" y2="132" stroke="#B71C1C" stroke-width="0.8" opacity="0.7"/>
  <!-- Wave details -->
  <path d="M20,140 Q35,136 50,140 Q65,144 80,140" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <path d="M110,142 Q125,138 140,142 Q155,146 170,142" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Label -->
  <text x="100" y="166" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#FFD700" letter-spacing="1">CALIFORNIA ADVENTURE</text>
</svg>
