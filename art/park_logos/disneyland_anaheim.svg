<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#1E3A8A"/>
  <!-- Fireworks -->
  <circle cx="50" cy="42" r="1.5" fill="#FFD700" opacity="0.7"/>
  <circle cx="155" cy="38" r="1.5" fill="#FF9E9E" opacity="0.7"/>
  <circle cx="38" cy="60" r="1.2" fill="#C0E0FF" opacity="0.6"/>
  <circle cx="165" cy="55" r="1.2" fill="#FFD700" opacity="0.6"/>
  <circle cx="170" cy="40" r="1" fill="#C0E0FF" opacity="0.5"/>
  <circle cx="42" cy="48" r="1" fill="#FF9E9E" opacity="0.5"/>
  <!-- Castle - Sleeping Beauty inspired, more ornate -->
  <!-- Outer walls -->
  <rect x="38" y="125" width="124" height="35" rx="2" fill="#E8CFFF"/>
  <!-- Gate arch -->
  <path d="M85,160 L85,138 Q100,128 115,138 L115,160 Z" fill="#1E3A8A"/>
  <!-- Gate portcullis lines -->
  <line x1="90" y1="138" x2="90" y2="158" stroke="#2A4A9A" stroke-width="1"/>
  <line x1="100" y1="128" x2="100" y2="158" stroke="#2A4A9A" stroke-width="1"/>
  <line x1="110" y1="138" x2="110" y2="158" stroke="#2A4A9A" stroke-width="1"/>
  <line x1="85" y1="145" x2="115" y2="145" stroke="#2A4A9A" stroke-width="1"/>
  <line x1="85" y1="152" x2="115" y2="152" stroke="#2A4A9A" stroke-width="1"/>
  <!-- Left battlement wall -->
  <rect x="38" y="118" width="6" height="9" fill="#E8CFFF"/>
  <rect x="46" y="118" width="6" height="9" fill="#E8CFFF"/>
  <rect x="54" y="118" width="6" height="9" fill="#E8CFFF"/>
  <!-- Right battlement wall -->
  <rect x="150" y="118" width="6" height="9" fill="#E8CFFF"/>
  <rect x="142" y="118" width="6" height="9" fill="#E8CFFF"/>
  <rect x="134" y="118" width="6" height="9" fill="#E8CFFF"/>
  <!-- Side towers -->
  <rect x="36" y="100" width="20" height="42" rx="1" fill="#D8B8FF"/>
  <polygon points="36,100 46,82 56,100" fill="#C8A0EE"/>
  <circle cx="46" cy="82" r="3" fill="#FFD700"/>
  <rect x="36" y="95" width="4" height="7" fill="#D8B8FF"/>
  <rect x="42" y="95" width="4" height="7" fill="#D8B8FF"/>
  <rect x="48" y="95" width="4" height="7" fill="#D8B8FF"/>
  <rect x="144" y="100" width="20" height="42" rx="1" fill="#D8B8FF"/>
  <polygon points="144,100 154,82 164,100" fill="#C8A0EE"/>
  <circle cx="154" cy="82" r="3" fill="#FFD700"/>
  <rect x="144" y="95" width="4" height="7" fill="#D8B8FF"/>
  <rect x="150" y="95" width="4" height="7" fill="#D8B8FF"/>
  <rect x="156" y="95" width="4" height="7" fill="#D8B8FF"/>
  <!-- Inner towers -->
  <rect x="62" y="90" width="18" height="52" rx="1" fill="#EDE0FF"/>
  <polygon points="62,90 71,68 80,90" fill="#D8C8FF"/>
  <circle cx="71" cy="68" r="3" fill="#FFD700"/>
  <rect x="118" y="90" width="18" height="52" rx="1" fill="#EDE0FF"/>
  <polygon points="118,90 127,68 136,90" fill="#D8C8FF"/>
  <circle cx="127" cy="68" r="3" fill="#FFD700"/>
  <!-- Main center tower -->
  <rect x="82" y="76" width="36" height="66" rx="1" fill="#F5F0FF"/>
  <polygon points="82,76 100,48 118,76" fill="#EAE0FF"/>
  <!-- Main tower flag -->
  <line x1="100" y1="48" x2="100" y2="32" stroke="#FFD700" stroke-width="2"/>
  <polygon points="100,32 114,38 100,44" fill="#FFD700"/>
  <!-- Center battlements -->
  <rect x="82" y="70" width="5" height="8" fill="#F5F0FF"/>
  <rect x="89" y="70" width="5" height="8" fill="#F5F0FF"/>
  <rect x="96" y="70" width="5" height="8" fill="#F5F0FF"/>
  <rect x="103" y="70" width="5" height="8" fill="#F5F0FF"/>
  <rect x="110" y="70" width="5" height="8" fill="#F5F0FF"/>
  <!-- Windows -->
  <rect x="93" y="92" width="7" height="9" rx="3.5" fill="#9AB8F8"/>
  <rect x="100" y="92" width="7" height="9" rx="3.5" fill="#9AB8F8"/>
  <!-- Moat suggestion -->
  <ellipse cx="100" cy="162" rx="58" ry="6" fill="#1E3A8A" opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="9.5" font-weight="bold" fill="#FFD700" letter-spacing="1">DISNEYLAND</text>
</svg>
