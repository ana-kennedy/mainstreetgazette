<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dlpSky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#3D1A7A"/>
      <stop offset="100%" stop-color="#1A0A3A"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#dlpSky)"/>
  <!-- Stars scattered -->
  <circle cx="35" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="60" cy="22" r="1" fill="white" opacity="0.6"/>
  <circle cx="145" cy="28" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="170" cy="35" r="1" fill="#FFD700" opacity="0.8"/>
  <circle cx="165" cy="20" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="40" cy="50" r="1" fill="white" opacity="0.5"/>
  <circle cx="158" cy="50" r="1" fill="white" opacity="0.6"/>
  <!-- Enchanted Storybook-inspired castle (Paris is more ornate/pink) -->
  <!-- Base platform -->
  <rect x="32" y="148" width="136" height="14" rx="2" fill="#C8A0D8"/>
  <!-- Wall battlements base -->
  <rect x="32" y="138" width="6" height="12" fill="#C8A0D8"/>
  <rect x="40" y="138" width="6" height="12" fill="#C8A0D8"/>
  <rect x="48" y="138" width="6" height="12" fill="#C8A0D8"/>
  <rect x="148" y="138" width="6" height="12" fill="#C8A0D8"/>
  <rect x="156" y="138" width="6" height="12" fill="#C8A0D8"/>
  <rect x="164" y="138" width="6" height="12" fill="#C8A0D8"/>
  <!-- Gate -->
  <path d="M88,162 L88,142 Q100,133 112,142 L112,162 Z" fill="#1A0A3A"/>
  <!-- Far left tower -->
  <rect x="32" y="110" width="16" height="40" rx="1" fill="#B890C8"/>
  <path d="M32,110 Q40,88 48,110" fill="#9A70B0"/>
  <line x1="40" y1="88" x2="40" y2="74" stroke="#9A70B0" stroke-width="2"/>
  <polygon points="40,74 48,80 40,86" fill="#FFD700"/>
  <!-- Inner left tower -->
  <rect x="56" y="100" width="18" height="50" rx="1" fill="#D0A8E0"/>
  <path d="M56,100 Q65,76 74,100" fill="#C090D0"/>
  <line x1="65" y1="76" x2="65" y2="60" stroke="#C090D0" stroke-width="2"/>
  <polygon points="65,60 74,66 65,72" fill="#FFD700"/>
  <!-- Inner right tower -->
  <rect x="126" y="100" width="18" height="50" rx="1" fill="#D0A8E0"/>
  <path d="M126,100 Q135,76 144,100" fill="#C090D0"/>
  <line x1="135" y1="76" x2="135" y2="60" stroke="#C090D0" stroke-width="2"/>
  <polygon points="135,60 144,66 135,72" fill="#FFD700"/>
  <!-- Far right tower -->
  <rect x="152" y="110" width="16" height="40" rx="1" fill="#B890C8"/>
  <path d="M152,110 Q160,88 168,110" fill="#9A70B0"/>
  <line x1="160" y1="88" x2="160" y2="74" stroke="#9A70B0" stroke-width="2"/>
  <polygon points="160,74 168,80 160,86" fill="#FFD700"/>
  <!-- Main center tower -->
  <rect x="80" y="86" width="40" height="76" rx="1" fill="#E8D0F8"/>
  <!-- Center tower roof (more elaborate - multi-pointed) -->
  <polygon points="80,86 100,52 120,86" fill="#D0B0F0"/>
  <!-- Secondary spire from center -->
  <line x1="100" y1="52" x2="100" y2="32" stroke="#D0B0F0" stroke-width="3"/>
  <polygon points="100,32 108,42 100,52 92,42" fill="#E0C0FF"/>
  <!-- Flag -->
  <line x1="100" y1="32" x2="100" y2="20" stroke="#FFD700" stroke-width="1.5"/>
  <polygon points="100,20 110,24 100,28" fill="#FFD700"/>
  <!-- Windows center tower -->
  <rect x="90" y="96" width="8" height="10" rx="4" fill="#9A70B0" opacity="0.8"/>
  <rect x="102" y="96" width="8" height="10" rx="4" fill="#9A70B0" opacity="0.8"/>
  <rect x="90" y="112" width="8" height="10" rx="4" fill="#9A70B0" opacity="0.6"/>
  <rect x="102" y="112" width="8" height="10" rx="4" fill="#9A70B0" opacity="0.6"/>
  <!-- Rose window -->
  <circle cx="100" cy="130" r="8" fill="none" stroke="#C090D0" stroke-width="1.5"/>
  <circle cx="100" cy="130" r="3" fill="#C090D0" opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="177" text-anchor="middle" font-family="Georgia, serif" font-size="8.5" font-weight="bold" fill="#E0C0FF" letter-spacing="1">DISNEYLAND PARIS</text>
</svg>
