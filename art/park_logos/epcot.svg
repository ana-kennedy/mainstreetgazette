<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#0A3D52"/>
  <!-- Geodesic sphere - Spaceship Earth inspired -->
  <!-- Outer glow -->
  <circle cx="100" cy="88" r="48" fill="none" stroke="#4ECDC4" stroke-width="1" opacity="0.3"/>
  <!-- Sphere base shape -->
  <circle cx="100" cy="88" r="44" fill="#0E5A75"/>
  <!-- Geodesic triangle pattern -->
  <!-- Latitude lines -->
  <ellipse cx="100" cy="88" rx="44" ry="12" fill="none" stroke="#4ECDC4" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="100" cy="88" rx="44" ry="26" fill="none" stroke="#4ECDC4" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="100" cy="88" rx="35" ry="43" fill="none" stroke="#4ECDC4" stroke-width="0.8" opacity="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="100" cy="88" rx="12" ry="44" fill="none" stroke="#4ECDC4" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="100" cy="88" rx="26" ry="44" fill="none" stroke="#4ECDC4" stroke-width="0.8" opacity="0.5"/>
  <!-- Diagonal geodesic lines -->
  <line x1="68" y1="52" x2="132" y2="124" stroke="#4ECDC4" stroke-width="0.7" opacity="0.5"/>
  <line x1="132" y1="52" x2="68" y2="124" stroke="#4ECDC4" stroke-width="0.7" opacity="0.5"/>
  <line x1="56" y1="70" x2="144" y2="106" stroke="#4ECDC4" stroke-width="0.7" opacity="0.4"/>
  <line x1="56" y1="106" x2="144" y2="70" stroke="#4ECDC4" stroke-width="0.7" opacity="0.4"/>
  <line x1="64" y1="58" x2="100" y2="132" stroke="#4ECDC4" stroke-width="0.7" opacity="0.4"/>
  <line x1="136" y1="58" x2="100" y2="132" stroke="#4ECDC4" stroke-width="0.7" opacity="0.4"/>
  <!-- Sphere highlight -->
  <circle cx="85" cy="73" r="14" fill="white" opacity="0.06"/>
  <!-- Sphere border -->
  <circle cx="100" cy="88" r="44" fill="none" stroke="#4ECDC4" stroke-width="1.5"/>
  <!-- Monorail track suggestion -->
  <line x1="40" y1="132" x2="160" y2="132" stroke="#4ECDC4" stroke-width="2.5" opacity="0.6"/>
  <rect x="82" y="128" width="36" height="8" rx="4" fill="#4ECDC4" opacity="0.4"/>
  <!-- Label -->
  <text x="100" y="164" text-anchor="middle" font-family="Futura, Arial, sans-serif" font-size="14" font-weight="bold" fill="#4ECDC4" letter-spacing="3">EPCOT</text>
  <!-- Dot accent -->
  <circle cx="100" cy="174" r="2" fill="#4ECDC4" opacity="0.5"/>
</svg>
