<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#1A2D6B"/>
  <!-- Stars -->
  <circle cx="40" cy="38" r="2.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="160" cy="45" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="55" cy="65" r="1.5" fill="#FFD700" opacity="0.5"/>
  <circle cx="148" cy="62" r="1.8" fill="#FFD700" opacity="0.7"/>
  <circle cx="170" cy="38" r="1.5" fill="#FFD700" opacity="0.5"/>
  <!-- Castle - main towers -->
  <!-- Left outer tower -->
  <rect x="42" y="108" width="16" height="48" rx="1" fill="#C8D8F8"/>
  <polygon points="42,108 50,90 58,108" fill="#A8C0F0"/>
  <!-- Battlements left tower -->
  <rect x="42" y="104" width="4" height="6" fill="#C8D8F8"/>
  <rect x="48" y="104" width="4" height="6" fill="#C8D8F8"/>
  <rect x="54" y="104" width="4" height="6" fill="#C8D8F8"/>
  <!-- Right outer tower -->
  <rect x="142" y="108" width="16" height="48" rx="1" fill="#C8D8F8"/>
  <polygon points="142,108 150,90 158,108" fill="#A8C0F0"/>
  <!-- Battlements right tower -->
  <rect x="142" y="104" width="4" height="6" fill="#C8D8F8"/>
  <rect x="148" y="104" width="4" height="6" fill="#C8D8F8"/>
  <rect x="154" y="104" width="4" height="6" fill="#C8D8F8"/>
  <!-- Left inner tower -->
  <rect x="66" y="100" width="18" height="56" rx="1" fill="#E0EAFF"/>
  <polygon points="66,100 75,78 84,100" fill="#C8D8F8"/>
  <rect x="66" y="96" width="4" height="6" fill="#E0EAFF"/>
  <rect x="72" y="96" width="4" height="6" fill="#E0EAFF"/>
  <rect x="78" y="96" width="4" height="6" fill="#E0EAFF"/>
  <!-- Right inner tower -->
  <rect x="116" y="100" width="18" height="56" rx="1" fill="#E0EAFF"/>
  <polygon points="116,100 125,78 134,100" fill="#C8D8F8"/>
  <rect x="116" y="96" width="4" height="6" fill="#E0EAFF"/>
  <rect x="122" y="96" width="4" height="6" fill="#E0EAFF"/>
  <rect x="128" y="96" width="4" height="6" fill="#E0EAFF"/>
  <!-- Center main tower -->
  <rect x="84" y="88" width="32" height="68" rx="1" fill="#EEF3FF"/>
  <polygon points="84,88 100,58 116,88" fill="#D8E8FF"/>
  <!-- Center tower battlements -->
  <rect x="84" y="83" width="5" height="7" fill="#EEF3FF"/>
  <rect x="91" y="83" width="5" height="7" fill="#EEF3FF"/>
  <rect x="98" y="83" width="5" height="7" fill="#EEF3FF"/>
  <rect x="105" y="83" width="5" height="7" fill="#EEF3FF"/>
  <rect x="111" y="83" width="5" height="7" fill="#EEF3FF"/>
