  <line x1="100" y1="58" x2="100" y2="42" stroke="#FFD700" stroke-width="1.5"/>
  <polygon points="100,42 112,47 100,52" fill="#FFD700"/>
  <!-- Archway / door -->
  <path d="M92,156 L92,130 Q100,122 108,130 L108,156 Z" fill="#1A2D6B"/>
  <!-- Windows -->
  <rect x="90" y="100" width="8" height="10" rx="4" fill="#B8D0FF" opacity="0.9"/>
  <rect x="102" y="100" width="8" height="10" rx="4" fill="#B8D0FF" opacity="0.9"/>
  <!-- Ground -->
  <rect x="30" y="154" width="140" height="5" rx="2" fill="#2A4080" opacity="0.6"/>
  <!-- Label -->
  <text x="100" y="174" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#FFD700" letter-spacing="1">MAGIC KINGDOM</text>
