  <path d="M40,148 L40,138 Q48,134 56,138 L56,148 Z" fill="#004080" opacity="0.5"/>
  <polygon points="40,138 48,128 56,138" fill="#004080" opacity="0.4"/>
  <rect x="47" y="130" width="2" height="10" fill="#003366" opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="176" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#4A90D9" letter-spacing="1">TOKYO DISNEYSEA</text>
</svg>
