<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tdsOcean" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#000D1A"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#tdsOcean)"/>
  <!-- Ocean waves at bottom -->
  <path d="M0,155 Q25,148 50,155 Q75,162 100,155 Q125,148 150,155 Q175,162 200,155 L200,200 L0,200 Z" fill="#004080" opacity="0.6"/>
  <path d="M0,162 Q30,156 60,162 Q90,168 120,162 Q150,156 180,162 Q190,160 200,162 L200,200 L0,200 Z" fill="#003070" opacity="0.8"/>
