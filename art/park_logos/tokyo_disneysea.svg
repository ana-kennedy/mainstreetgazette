  <ellipse cx="100" cy="52" rx="15" ry="8" fill="#FF6600" opacity="0.6"/>
  <ellipse cx="100" cy="54" rx="9" ry="5" fill="#FFAA00" opacity="0.8"/>
  <!-- Lava streams -->
  <path d="M95,58 Q92,70 88,85 Q86,90 90,88 Q92,80 95,70 Z" fill="#FF4400" opacity="0.6"/>
  <path d="M105,58 Q108,72 112,86 Q114,91 110,89 Q108,80 105,70 Z" fill="#FF4400" opacity="0.5"/>
  <!-- Compass rose in foreground/sea area -->
  <circle cx="100" cy="118" r="22" fill="none" stroke="#4A90D9" stroke-width="1.5" opacity="0.8"/>
  <circle cx="100" cy="118" r="14" fill="none" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
  <!-- Compass points -->
  <polygon points="100,96 103,112 100,110 97,112" fill="#E8E8E8"/>
  <polygon points="100,140 103,124 100,126 97,124" fill="#C0C0C0"/>
  <polygon points="78,118 94,115 92,118 94,121" fill="#C0C0C0"/>
  <polygon points="122,118 106,115 108,118 106,121" fill="#E8E8E8"/>
  <!-- N label -->
  <text x="100" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#4A90D9">N</text>
  <!-- Center dot -->
  <circle cx="100" cy="118" r="3" fill="#4A90D9"/>
  <!-- Ship anchor shape hint -->
  <circle cx="100" cy="118" r="2" fill="#FFD700"/>
