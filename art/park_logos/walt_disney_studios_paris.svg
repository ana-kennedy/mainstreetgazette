<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="100" r="100" fill="#0D0D1A"/>
  <!-- Spotlight effect -->
  <polygon points="100,160 65,30 135,30" fill="#FFD700" opacity="0.04"/>
  <!-- Film reel - large, centered -->
  <circle cx="100" cy="92" r="52" fill="#1A1A2E"/>
  <circle cx="100" cy="92" r="52" fill="none" stroke="#E53935" stroke-width="3"/>
  <!-- Reel holes pattern - film perforations around edge -->
  <circle cx="100" cy="42" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="137" cy="55" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="152" cy="92" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="137" cy="129" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="100" cy="142" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="63" cy="129" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="48" cy="92" r="5" fill="#E53935" opacity="0.8"/>
  <circle cx="63" cy="55" r="5" fill="#E53935" opacity="0.8"/>
  <!-- Reel spokes -->
  <line x1="100" y1="92" x2="100" y2="52" stroke="#2A2A3E" stroke-width="10" stroke-linecap="round"/>
  <line x1="100" y1="92" x2="133" y2="112" stroke="#2A2A3E" stroke-width="10" stroke-linecap="round"/>
  <line x1="100" y1="92" x2="67" y2="112" stroke="#2A2A3E" stroke-width="10" stroke-linecap="round"/>
  <!-- Spoke highlights -->
  <line x1="100" y1="92" x2="100" y2="52" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="92" x2="133" y2="112" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="100" y1="92" x2="67" y2="112" stroke="#E53935" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Center hub -->
  <circle cx="100" cy="92" r="18" fill="#2A2A3E"/>
  <circle cx="100" cy="92" r="18" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <circle cx="100" cy="92" r="8" fill="#0D0D1A"/>
  <circle cx="100" cy="92" r="8" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <!-- Film strip across bottom -->
  <rect x="22" y="152" width="156" height="22" rx="3" fill="#1A1A2E"/>
  <rect x="22" y="152" width="156" height="22" rx="3" fill="none" stroke="#E53935" stroke-width="1"/>
  <!-- Film sprocket holes -->
  <rect x="26" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="35" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="44" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="26" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="35" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="44" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="158" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="149" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="140" y="155" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="158" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="149" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <rect x="140" y="163" width="6" height="7" rx="1" fill="#0D0D1A"/>
  <!-- Film frame content -->
  <rect x="54" y="154" width="92" height="18" rx="1" fill="#2A2A3E"/>
  <text x="100" y="166" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-size="7" font-weight="bold" fill="#E53935" letter-spacing="2">STUDIOS PARIS</text>
</svg>
